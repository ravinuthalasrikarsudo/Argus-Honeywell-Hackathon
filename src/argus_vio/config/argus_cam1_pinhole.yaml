%YAML:1.0
---
# ARGUS cam1 = RIGHT. Same intrinsics as cam0 (identical sim cameras).
# Stereo baseline 0.12 m is encoded by body_T_cam0/body_T_cam1 in the main
# config, NOT here (VINS derives the stereo geometry from the two extrinsics).
model_type: PINHOLE
camera_name: cam1
image_width: 1280
image_height: 720
distortion_parameters:
   k1: 0.0
   k2: 0.0
   p1: 0.0
   p2: 0.0
projection_parameters:
   fx: 640.0
   fy: 640.0
   cx: 640.0
   cy: 360.0
